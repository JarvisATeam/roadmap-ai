<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Forecast — Dashboard Panel</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--accent:#38bdf8;--green:#22c55e;--yellow:#facc15;--red:#ef4444;--text:#e2e8f0;--muted:#94a3b8;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem}
h1{font-size:1.6rem;margin-bottom:.5rem}
h1 span{color:var(--accent)}
.source{color:var(--muted);font-size:.75rem;margin-bottom:1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem}
.card{background:var(--card);border-radius:var(--radius);padding:1.5rem;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.card h2{font-size:.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.big{font-size:2.4rem;font-weight:700;line-height:1}
.sub{color:var(--muted);font-size:.85rem;margin-top:.25rem}
.prob-high{color:var(--green)}
.prob-medium{color:var(--yellow)}
.prob-low{color:var(--red)}
.progress-ring{position:relative;width:120px;height:120px;margin:1rem auto}
.progress-ring svg{transform:rotate(-90deg)}
.progress-ring circle{fill:none;stroke-width:8}
.progress-ring .bg{stroke:rgba(255,255,255,.08)}
.progress-ring .fill{stroke:var(--green);stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.progress-ring .center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.progress-ring .pct{font-size:1.6rem;font-weight:700}
.progress-ring .label{font-size:.7rem;color:var(--muted)}
.stats-row{display:flex;justify-content:space-around;margin-top:1.5rem;flex-wrap:wrap;gap:1rem}
.stat-item{text-align:center}
.stat-val{font-size:1.6rem;font-weight:700}
.stat-label{font-size:.75rem;color:var(--muted);margin-top:.25rem}
.timeline{margin-top:1rem;padding:1rem;background:rgba(255,255,255,.03);border-radius:8px}
.timeline-row{display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.85rem}
.timeline-row:last-child{border-bottom:none}
.timeline-label{color:var(--muted)}
.meta-table{width:100%;border-collapse:collapse;margin-top:.5rem}
.meta-table td{padding:.35rem .5rem;font-size:.8rem;border-bottom:1px solid rgba(255,255,255,.05)}
.meta-table td:first-child{color:var(--muted);width:50%}
.fallback{text-align:center;padding:3rem 1rem}
.fallback h2{font-size:1.2rem;margin-bottom:.5rem}
.fallback p{color:var(--muted);font-size:.9rem}
.ts{color:var(--muted);font-size:.75rem;margin-top:.3rem}
footer{margin-top:2rem;text-align:center;color:var(--muted);font-size:.75rem}
#error-banner{display:none;background:rgba(239,68,68,.15);border:1px solid var(--red);color:var(--red);padding:.75rem 1rem;border-radius:var(--radius);margin-bottom:1rem;font-size:.85rem}
</style>
</head>
<body>

<h1>📈 <span>Forecast</span></h1>
<div class="source" id="source-line">Source: panel_output/forecast.json</div>
<div id="error-banner"></div>
<div id="content"></div>
<footer id="footer">Forecast v0.4.0 · ASK-P4-005</footer>

<script>
const DATA_PATH = '../panel_output/forecast.json';
const REFRESH_MS = 30000;
const content = document.getElementById('content');
const footer = document.getElementById('footer');
const srcLine = document.getElementById('source-line');
const errBanner = document.getElementById('error-banner');

function fmtTime(iso) {
  try { return new Date(iso).toLocaleString(); }
  catch { return iso || 'unknown'; }
}

function fmtDate(iso) {
  try { return new Date(iso).toLocaleDateString(); }
  catch { return iso || 'unknown'; }
}

function probClass(p) {
  if (p >= 0.7) return 'prob-high';
  if (p >= 0.4) return 'prob-medium';
  return 'prob-low';
}

function renderData(json) {
  errBanner.style.display = 'none';
  const d = json.data || {};
  const meta = json.metadata || {};
  const ts = json.timestamp || '';
  
  const prob = d.completion_probability ?? 0;
  const probPct = (prob * 100).toFixed(0);
  const circumference = 2 * Math.PI * 50;
  const offset = circumference - (prob * circumference);
  const strokeColor = prob >= 0.7 ? 'var(--green)' : prob >= 0.4 ? 'var(--yellow)' : 'var(--red)';

  srcLine.textContent = 'Source: panel_output/forecast.json · Updated: ' + fmtTime(ts);

  content.innerHTML = `
    <div class="grid">
      <div class="card">
        <h2>Completion Probability</h2>
        <div class="progress-ring">
          <svg width="120" height="120">
            <circle class="bg" cx="60" cy="60" r="50"/>
            <circle class="fill" cx="60" cy="60" r="50" 
              style="stroke:${strokeColor};stroke-dasharray:${circumference};stroke-dashoffset:${offset}"/>
          </svg>
          <div class="center-text">
            <div class="pct ${probClass(prob)}">${probPct}%</div>
            <div class="label">chance</div>
          </div>
        </div>
        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-val" style="color:var(--accent)">${d.velocity ?? 0}</div>
            <div class="stat-label">Velocity</div>
          </div>
          <div class="stat-item">
            <div class="stat-val" style="color:var(--green)">${d.days_remaining ?? '?'}</div>
            <div class="stat-label">Days Left</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Mission: ${d.mission_name || 'Unknown'}</h2>
        <div class="timeline">
          <div class="timeline-row">
            <span class="timeline-label">Expected completion</span>
            <span>${fmtDate(d.expected_completion)}</span>
          </div>
          <div class="timeline-row">
            <span class="timeline-label">Tasks completed</span>
            <span style="color:var(--green)">${d.tasks_completed ?? 0} / ${d.tasks_total ?? 0}</span>
          </div>
          <div class="timeline-row">
            <span class="timeline-label">Tasks remaining</span>
            <span style="color:var(--yellow)">${d.tasks_remaining ?? 0}</span>
          </div>
          <div class="timeline-row">
            <span class="timeline-label">Revenue projection</span>
            <span style="color:var(--accent)">€${(d.revenue ?? 0).toLocaleString()}</span>
          </div>
        </div>
        <div class="ts" style="margin-top:1rem">
          Mission ID: ${(d.mission_id || '').substring(0, 12)}…
        </div>
      </div>

      <div class="card">
        <h2>Metadata</h2>
        <table class="meta-table">
          <tr><td>Missions count</td><td>${meta.missions_count ?? 0}</td></tr>
          <tr><td>Steps total</td><td>${meta.steps_total ?? 0}</td></tr>
          <tr><td>Steps completed</td><td>${meta.steps_completed ?? 0}</td></tr>
          <tr><td>Steps remaining</td><td>${meta.steps_remaining ?? 0}</td></tr>
          <tr><td>Roadmap version</td><td>${json.roadmap_version || '?'}</td></tr>
          <tr><td>Command</td><td>${json.command || '?'}</td></tr>
        </table>
      </div>
    </div>
  `;

  footer.textContent = 'Forecast v0.4.0 · ASK-P4-005 · Last refresh: ' + new Date().toLocaleTimeString();
}

function renderFallback(reason) {
  errBanner.style.display = 'block';
  errBanner.textContent = reason;
  content.innerHTML = `
    <div class="card fallback">
      <h2>Waiting for forecast data…</h2>
      <p>Run <code>roadmap forecast &lt;mission-id&gt; --json > panel_output/forecast.json</code></p>
      <div class="ts">Source: panel_output/forecast.json</div>
      <div class="ts">Checked: ${new Date().toLocaleString()}</div>
    </div>
  `;
  footer.textContent = 'Forecast v0.4.0 · ASK-P4-005 · No data';
}

async function load() {
  try {
    const resp = await fetch(DATA_PATH, { cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    let json;
    try { json = JSON.parse(text); }
    catch (e) { throw new Error('Invalid JSON: ' + e.message); }
    if (!json.data) {
      throw new Error('Missing data object in JSON');
    }
    renderData(json);
  } catch (err) {
    renderFallback(err.message);
  }
}

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
