<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Orchestration — Dashboard</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--accent:#38bdf8;--green:#22c55e;--yellow:#facc15;--red:#ef4444;--text:#e2e8f0;--muted:#94a3b8;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem}
h1{font-size:1.6rem;margin-bottom:.5rem}
h1 span{color:var(--accent)}
.source{color:var(--muted);font-size:.75rem;margin-bottom:1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem}
.card{background:var(--card);border-radius:var(--radius);padding:1.5rem;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.card h2{font-size:.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.big{font-size:2.4rem;font-weight:700;line-height:1}
.sub{color:var(--muted);font-size:.85rem;margin-top:.25rem}
.stat-row{display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.85rem}
footer{margin-top:2rem;text-align:center;color:var(--muted);font-size:.75rem}
</style>
</head>
<body>
<h1>🤖 <span>Orchestration</span></h1>
<div class="source" id="src">Source: panel_output/orchestration.json</div>
<div id="content"></div>
<footer id="footer">Orchestration v0.5.0 · ASK-P5-004</footer>
<script>
const PATH='../panel_output/orchestration.json';
async function load(){
try{
const r=await fetch(PATH,{cache:'no-store'});
const j=await r.json();
const q=j.data.queue_depth||{};
const a=j.data.by_agent||{};
document.getElementById('content').innerHTML=`
<div class="grid">
<div class="card"><h2>Queue Depth</h2><div class="big">${q.total||0}</div><div class="sub">Total tasks</div>
<div style="margin-top:1rem">
<div class="stat-row"><span>Pending</span><span>${q.pending||0}</span></div>
<div class="stat-row"><span>Approved</span><span style="color:var(--green)">${q.approved||0}</span></div>
<div class="stat-row"><span>Blocked</span><span style="color:var(--red)">${q.blocked||0}</span></div>
<div class="stat-row"><span>Done</span><span style="color:var(--green)">${q.done||0}</span></div>
</div></div>
<div class="card"><h2>By Agent</h2>
<div class="stat-row"><span>GINIE</span><span>${a.GINIE||0}</span></div>
<div class="stat-row"><span>AVA</span><span>${a.AVA||0}</span></div>
<div class="stat-row"><span>CODEX</span><span>${a.CODEX||0}</span></div>
<div class="stat-row"><span>HUMAN_ONLY</span><span style="color:var(--red)">${a.HUMAN_ONLY||0}</span></div>
</div>
</div>`;
}catch(e){document.getElementById('content').innerHTML='<div class="card">Waiting for data...</div>';}
}
load();setInterval(load,30000);
</script>
</body>
</html>
