<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Progress — Dashboard Panel</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--accent:#38bdf8;--green:#22c55e;--yellow:#facc15;--red:#ef4444;--text:#e2e8f0;--muted:#94a3b8;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem}
h1{font-size:1.6rem;margin-bottom:.5rem}
h1 span{color:var(--accent)}
.source{color:var(--muted);font-size:.75rem;margin-bottom:1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:1.5rem}
.card{background:var(--card);border-radius:var(--radius);padding:1.5rem;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.card h2{font-size:.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.big{font-size:2.4rem;font-weight:700;line-height:1}
.sub{color:var(--muted);font-size:.85rem;margin-top:.25rem}
.progress-bar{width:100%;height:24px;background:rgba(255,255,255,.08);border-radius:12px;overflow:hidden;margin:1rem 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .6s ease;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600}
.mission-list{margin-top:1rem}
.mission-item{background:rgba(255,255,255,.03);border-radius:8px;padding:1rem;margin:.75rem 0;border-left:3px solid var(--accent)}
.mission-item.active{border-left-color:var(--green)}
.mission-item.paused{border-left-color:var(--yellow)}
.mission-item.done{border-left-color:var(--muted);opacity:.7}
.mission-title{font-weight:600;font-size:.9rem;margin-bottom:.25rem}
.mission-code{color:var(--muted);font-size:.75rem;font-family:monospace}
.milestone-count{color:var(--muted);font-size:.8rem;margin-top:.5rem}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-top:1rem}
.stat-box{background:rgba(255,255,255,.03);padding:.75rem;border-radius:6px;text-align:center}
.stat-val{font-size:1.8rem;font-weight:700}
.stat-label{font-size:.75rem;color:var(--muted);margin-top:.25rem}
.fallback{text-align:center;padding:3rem 1rem}
.fallback h2{font-size:1.2rem;margin-bottom:.5rem}
.fallback p{color:var(--muted);font-size:.9rem}
.ts{color:var(--muted);font-size:.75rem;margin-top:.3rem}
footer{margin-top:2rem;text-align:center;color:var(--muted);font-size:.75rem}
#error-banner{display:none;background:rgba(239,68,68,.15);border:1px solid var(--red);color:var(--red);padding:.75rem 1rem;border-radius:var(--radius);margin-bottom:1rem;font-size:.85rem}
</style>
</head>
<body>

<h1>📊 <span>Progress</span></h1>
<div class="source" id="source-line">Source: panel_output/status.json</div>
<div id="error-banner"></div>
<div id="content"></div>
<footer id="footer">Progress v0.4.0 · ASK-P4-003</footer>

<script>
const DATA_PATH = '../panel_output/status.json';
const REFRESH_MS = 30000;
const content = document.getElementById('content');
const footer = document.getElementById('footer');
const srcLine = document.getElementById('source-line');
const errBanner = document.getElementById('error-banner');

function fmtTime(iso) {
  try { return new Date(iso).toLocaleString(); }
  catch { return iso || 'unknown'; }
}

function countSteps(missions) {
  let total = 0, done = 0, inProgress = 0, todo = 0;
  
  missions.forEach(m => {
    (m.milestones || []).forEach(ms => {
      (ms.steps || []).forEach(s => {
        total++;
        if (s.status === 'done') done++;
        else if (s.status === 'in_progress') inProgress++;
        else if (s.status === 'todo') todo++;
      });
    });
  });
  
  return { total, done, inProgress, todo };
}

function renderData(json) {
  errBanner.style.display = 'none';
  const d = json.data || {};
  const missions = d.missions || [];
  const ts = json.timestamp || '';
  
  const stepStats = countSteps(missions);
  const completionPct = stepStats.total > 0 
    ? (stepStats.done / stepStats.total * 100).toFixed(1) 
    : 0;

  srcLine.textContent = 'Source: panel_output/status.json · Updated: ' + fmtTime(ts);

  const missionsHtml = missions.length > 0 
    ? missions.map(m => {
        const milestones = m.milestones || [];
        const stepCount = milestones.reduce((sum, ms) => sum + (ms.steps || []).length, 0);
        return `
          <div class="mission-item ${m.status}">
            <div class="mission-title">${m.title || 'Untitled Mission'}</div>
            <div class="mission-code">${m.mission_code || m.id.substring(0, 8)}</div>
            <div class="milestone-count">
              ${milestones.length} milestone${milestones.length !== 1 ? 's' : ''} · 
              ${stepCount} step${stepCount !== 1 ? 's' : ''}
            </div>
          </div>
        `;
      }).join('')
    : '<div class="fallback"><p>No missions found</p></div>';

  content.innerHTML = `
    <div class="grid">
      <div class="card">
        <h2>Overall Completion</h2>
        <div class="big" style="color:var(--green)">${completionPct}%</div>
        <div class="sub">${stepStats.done} of ${stepStats.total} steps completed</div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${completionPct}%">
            ${completionPct > 10 ? completionPct + '%' : ''}
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-val" style="color:var(--green)">${stepStats.done}</div>
            <div class="stat-label">Done</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" style="color:var(--yellow)">${stepStats.inProgress}</div>
            <div class="stat-label">In Progress</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" style="color:var(--muted)">${stepStats.todo}</div>
            <div class="stat-label">Todo</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" style="color:var(--accent)">${stepStats.total}</div>
            <div class="stat-label">Total</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Active Missions (${missions.length})</h2>
        <div class="mission-list">
          ${missionsHtml}
        </div>
      </div>

      <div class="card">
        <h2>Metadata</h2>
        <table style="width:100%;border-collapse:collapse">
          <tr style="border-bottom:1px solid rgba(255,255,255,.05)">
            <td style="padding:.4rem .5rem;color:var(--muted);font-size:.8rem">Roadmap version</td>
            <td style="padding:.4rem .5rem;font-size:.8rem">${json.roadmap_version || '?'}</td>
          </tr>
          <tr style="border-bottom:1px solid rgba(255,255,255,.05)">
            <td style="padding:.4rem .5rem;color:var(--muted);font-size:.8rem">Command</td>
            <td style="padding:.4rem .5rem;font-size:.8rem">${json.command || '?'}</td>
          </tr>
          <tr style="border-bottom:1px solid rgba(255,255,255,.05)">
            <td style="padding:.4rem .5rem;color:var(--muted);font-size:.8rem">Missions</td>
            <td style="padding:.4rem .5rem;font-size:.8rem">${missions.length}</td>
          </tr>
          <tr>
            <td style="padding:.4rem .5rem;color:var(--muted);font-size:.8rem">Timestamp</td>
            <td style="padding:.4rem .5rem;font-size:.8rem;font-size:.7rem">${fmtTime(ts)}</td>
          </tr>
        </table>
      </div>
    </div>
  `;

  footer.textContent = 'Progress v0.4.0 · ASK-P4-003 · Last refresh: ' + new Date().toLocaleTimeString();
}

function renderFallback(reason) {
  errBanner.style.display = 'block';
  errBanner.textContent = reason;
  content.innerHTML = `
    <div class="card fallback">
      <h2>Waiting for progress data…</h2>
      <p>Run <code>./scripts/dispatch_runner.sh standup</code> to generate panel data.</p>
      <div class="ts">Source: panel_output/status.json</div>
      <div class="ts">Checked: ${new Date().toLocaleString()}</div>
    </div>
  `;
  footer.textContent = 'Progress v0.4.0 · ASK-P4-003 · No data';
}

async function load() {
  try {
    const resp = await fetch(DATA_PATH, { cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    let json;
    try { json = JSON.parse(text); }
    catch (e) { throw new Error('Invalid JSON: ' + e.message); }
    if (!json.data) {
      throw new Error('Missing data object in JSON');
    }
    renderData(json);
  } catch (err) {
    renderFallback(err.message);
  }
}

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
