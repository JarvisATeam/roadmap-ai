<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Revenue — Dashboard</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--accent:#38bdf8;--green:#22c55e;--yellow:#facc15;--red:#ef4444;--text:#e2e8f0;--muted:#94a3b8;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem}
h1{font-size:1.6rem;margin-bottom:.5rem}
h1 span{color:var(--accent)}
.source{color:var(--muted);font-size:.75rem;margin-bottom:1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem}
.card{background:var(--card);border-radius:var(--radius);padding:1.5rem;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.card h2{font-size:.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.big{font-size:2.4rem;font-weight:700;line-height:1}
.sub{color:var(--muted);font-size:.85rem;margin-top:.25rem}
.charge-list{margin-top:1rem}
.charge-item{background:rgba(255,255,255,.03);border-radius:8px;padding:.75rem;margin:.5rem 0;border-left:3px solid var(--green)}
.charge-item.failed{border-left-color:var(--red);opacity:.7}
.charge-amount{font-weight:600;font-size:.9rem}
.charge-meta{color:var(--muted);font-size:.75rem;margin-top:.25rem}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-top:1rem}
.stat-box{background:rgba(255,255,255,.03);padding:.75rem;border-radius:6px;text-align:center}
.stat-val{font-size:1.4rem;font-weight:700}
.stat-label{font-size:.75rem;color:var(--muted);margin-top:.25rem}
footer{margin-top:2rem;text-align:center;color:var(--muted);font-size:.75rem}
#error-banner{display:none;background:rgba(239,68,68,.15);border:1px solid var(--red);color:var(--red);padding:.75rem 1rem;border-radius:var(--radius);margin-bottom:1rem;font-size:.85rem}
</style>
</head>
<body>
<h1>💰 <span>Revenue</span></h1>
<div class="source" id="src">Source: panel_output/revenue.json</div>
<div id="error-banner"></div>
<div id="content"></div>
<footer id="footer">Revenue v0.6.0 · ASK-P6-003</footer>
<script>
const PATH='../panel_output/revenue.json';
const REFRESH_MS=60000;

function fmtTime(iso){try{return new Date(iso).toLocaleString()}catch{return iso||'unknown'}}
function fmtCurrency(amt,cur){return new Intl.NumberFormat('nb-NO',{style:'currency',currency:cur}).format(amt)}

async function load(){
  try{
    const r=await fetch(PATH,{cache:'no-store'});
    const j=await r.json();
    
    if(j.data.error){
      document.getElementById('error-banner').style.display='block';
      document.getElementById('error-banner').textContent='Error: '+j.data.error;
      document.getElementById('content').innerHTML='<div class="card"><h2>Stripe Error</h2><p>'+j.data.error+'</p></div>';
      return;
    }
    
    const d=j.data;
    const charges=d.recent_charges||[];
    const total=d.total_revenue||0;
    const currency=d.currency||'USD';
    const avg=d.average_transaction||0;
    
    document.getElementById('src').textContent='Source: panel_output/revenue.json · Updated: '+fmtTime(j.timestamp);
    
    const chargesHtml=charges.map(c=>`
      <div class="charge-item ${c.status==='succeeded'?'':'failed'}">
        <div class="charge-amount">${fmtCurrency(c.amount,c.currency)} · ${c.status.toUpperCase()}</div>
        <div class="charge-meta">${c.description} · ${fmtTime(c.created)}</div>
      </div>
    `).join('');
    
    document.getElementById('content').innerHTML=`
      <div class="grid">
        <div class="card">
          <h2>Total Revenue (${d.period})</h2>
          <div class="big" style="color:var(--green)">${fmtCurrency(total,currency)}</div>
          <div class="sub">${d.successful_charges} successful charges</div>
          <div class="stats-grid" style="margin-top:1rem">
            <div class="stat-box">
              <div class="stat-val" style="color:var(--accent)">${fmtCurrency(avg,currency)}</div>
              <div class="stat-label">Avg Transaction</div>
            </div>
            <div class="stat-box">
              <div class="stat-val" style="color:var(--red)">${d.failed_charges||0}</div>
              <div class="stat-label">Failed</div>
            </div>
          </div>
        </div>
        
        <div class="card" style="grid-column:1/-1">
          <h2>Recent Charges (${charges.length})</h2>
          <div class="charge-list">${chargesHtml||'<p style="color:var(--muted)">No charges</p>'}</div>
        </div>
        
        <div class="card">
          <h2>Metadata</h2>
          <div style="font-size:.85rem;line-height:1.6">
            <div style="color:var(--muted)">Mode: <strong>${j.metadata.stripe_mode||'unknown'}</strong></div>
            <div style="color:var(--muted);margin-top:.5rem">Analyzed: ${j.metadata.charges_analyzed||0} charges</div>
          </div>
        </div>
      </div>
    `;
    
    document.getElementById('footer').textContent='Revenue v0.6.0 · ASK-P6-003 · Last refresh: '+new Date().toLocaleTimeString();
  }catch(e){
    document.getElementById('error-banner').style.display='block';
    document.getElementById('error-banner').textContent=e.message;
    document.getElementById('content').innerHTML='<div class="card"><h2>Waiting for data…</h2><p>Run <code>python scripts/stripe_revenue_sync.py</code></p></div>';
  }
}
load();
setInterval(load,REFRESH_MS);
</script>
</body>
</html>
