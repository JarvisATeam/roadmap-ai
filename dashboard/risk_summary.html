<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Risk Summary — Dashboard Panel</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--accent:#38bdf8;--green:#22c55e;--yellow:#facc15;--red:#ef4444;--text:#e2e8f0;--muted:#94a3b8;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem}
h1{font-size:1.6rem;margin-bottom:.5rem}
h1 span{color:var(--accent)}
.source{color:var(--muted);font-size:.75rem;margin-bottom:1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem}
.card{background:var(--card);border-radius:var(--radius);padding:1.5rem;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.card h2{font-size:.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.big{font-size:2.4rem;font-weight:700;line-height:1}
.sub{color:var(--muted);font-size:.85rem;margin-top:.25rem}
.meta-table{width:100%;border-collapse:collapse;margin-top:.5rem}
.meta-table td{padding:.35rem .5rem;font-size:.8rem;border-bottom:1px solid rgba(255,255,255,.05)}
.meta-table td:first-child{color:var(--muted);width:50%}
.fallback{text-align:center;padding:3rem 1rem}
.fallback h2{font-size:1.2rem;margin-bottom:.5rem}
.fallback p{color:var(--muted);font-size:.9rem}
.ts{color:var(--muted);font-size:.75rem;margin-top:.3rem}
.status-ok{color:var(--green)}
.status-warn{color:var(--yellow)}
.status-critical{color:var(--red)}
footer{margin-top:2rem;text-align:center;color:var(--muted);font-size:.75rem}
#error-banner{display:none;background:rgba(239,68,68,.15);border:1px solid var(--red);color:var(--red);padding:.75rem 1rem;border-radius:var(--radius);margin-bottom:1rem;font-size:.85rem}
.warning-list{margin-top:1rem;padding:0;list-style:none}
.warning-item{background:rgba(250,204,21,.1);border-left:3px solid var(--yellow);padding:.75rem 1rem;margin:.5rem 0;border-radius:4px;font-size:.85rem}
.warning-item.critical{background:rgba(239,68,68,.1);border-left-color:var(--red)}
.empty-state{text-align:center;padding:2rem;color:var(--muted);font-size:.9rem}
</style>
</head>
<body>

<h1>⚠️ <span>Risk Summary</span></h1>
<div class="source" id="source-line">Source: panel_output/risks.json</div>
<div id="error-banner"></div>
<div id="content"></div>
<footer id="footer">Risk Summary v0.4.0 · ASK-P4-002</footer>

<script>
const DATA_PATH = '../panel_output/risks.json';
const REFRESH_MS = 30000;
const content = document.getElementById('content');
const footer = document.getElementById('footer');
const srcLine = document.getElementById('source-line');
const errBanner = document.getElementById('error-banner');

function fmtTime(iso) {
  try { return new Date(iso).toLocaleString(); }
  catch { return iso || 'unknown'; }
}

function riskStatus(blocked, overdue, critical) {
  if (critical > 0 || blocked > 0) return 'status-critical';
  if (overdue > 0) return 'status-warn';
  return 'status-ok';
}

function renderData(json) {
  errBanner.style.display = 'none';
  const d = json.data || {};
  const meta = json.metadata || {};
  const ts = json.timestamp || '';
  
  const blocked = d.blocked_tasks ?? 0;
  const overdue = d.overdue_tasks ?? 0;
  const critical = d.critical_warnings ?? 0;
  const summaryWarn = d.summary_warnings ?? 0;
  const warnings = d.warnings || [];
  const totalIncomplete = d.total_incomplete ?? 0;
  
  const statusClass = riskStatus(blocked, overdue, critical);
  const healthScore = Math.max(0, 100 - (blocked * 30) - (overdue * 10) - (critical * 25));

  srcLine.textContent = 'Source: panel_output/risks.json · Updated: ' + fmtTime(ts);

  let warningsHtml = '';
  if (warnings.length > 0) {
    warningsHtml = `
      <div class="card">
        <h2>Active Warnings</h2>
        <ul class="warning-list">
          ${warnings.map(w => `
            <li class="warning-item ${w.severity === 'critical' ? 'critical' : ''}">
              ${w.message || w}
            </li>
          `).join('')}
        </ul>
      </div>
    `;
  } else {
    warningsHtml = `
      <div class="card">
        <h2>Active Warnings</h2>
        <div class="empty-state">✅ No warnings</div>
      </div>
    `;
  }

  content.innerHTML = `
    <div class="grid">
      <div class="card">
        <h2>Risk Health Score</h2>
        <div class="big ${statusClass}">${healthScore.toFixed(0)}</div>
        <div class="sub">Calculated from blockers, overdue tasks, and critical warnings</div>
        <div class="ts">Missions analyzed: ${d.missions_analyzed ?? 0}</div>
      </div>

      <div class="card">
        <h2>Risk Metrics</h2>
        <table class="meta-table">
          <tr>
            <td>Blocked tasks</td>
            <td class="${blocked > 0 ? 'status-critical' : 'status-ok'}">${blocked}</td>
          </tr>
          <tr>
            <td>Overdue tasks</td>
            <td class="${overdue > 0 ? 'status-warn' : 'status-ok'}">${overdue}</td>
          </tr>
          <tr>
            <td>Critical warnings</td>
            <td class="${critical > 0 ? 'status-critical' : 'status-ok'}">${critical}</td>
          </tr>
          <tr>
            <td>Summary warnings</td>
            <td class="${summaryWarn > 0 ? 'status-warn' : 'status-ok'}">${summaryWarn}</td>
          </tr>
          <tr>
            <td>Total incomplete</td>
            <td>${totalIncomplete}</td>
          </tr>
        </table>
      </div>

      <div class="card">
        <h2>Metadata</h2>
        <table class="meta-table">
          <tr><td>Missions count</td><td>${meta.missions_count ?? 0}</td></tr>
          <tr><td>Steps total</td><td>${meta.steps_total ?? 0}</td></tr>
          <tr><td>Steps completed</td><td>${meta.steps_completed ?? 0}</td></tr>
          <tr><td>Steps remaining</td><td>${meta.steps_remaining ?? 0}</td></tr>
          <tr><td>Roadmap version</td><td>${json.roadmap_version || '?'}</td></tr>
          <tr><td>Command</td><td>${json.command || '?'}</td></tr>
        </table>
      </div>

      ${warningsHtml}
    </div>
  `;

  footer.textContent = 'Risk Summary v0.4.0 · ASK-P4-002 · Last refresh: ' + new Date().toLocaleTimeString();
}

function renderFallback(reason) {
  errBanner.style.display = 'block';
  errBanner.textContent = reason;
  content.innerHTML = `
    <div class="card fallback">
      <h2>Waiting for risk data…</h2>
      <p>Run <code>./scripts/dispatch_runner.sh standup</code> to generate panel data.</p>
      <div class="ts">Source: panel_output/risks.json</div>
      <div class="ts">Checked: ${new Date().toLocaleString()}</div>
    </div>
  `;
  footer.textContent = 'Risk Summary v0.4.0 · ASK-P4-002 · No data';
}

async function load() {
  try {
    const resp = await fetch(DATA_PATH, { cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    let json;
    try { json = JSON.parse(text); }
    catch (e) { throw new Error('Invalid JSON: ' + e.message); }
    if (!json.data) {
      throw new Error('Missing data object in JSON');
    }
    renderData(json);
  } catch (err) {
    renderFallback(err.message);
  }
}

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
