<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Remote Health — Dashboard</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--accent:#38bdf8;--green:#22c55e;--yellow:#facc15;--red:#ef4444;--text:#e2e8f0;--muted:#94a3b8;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem}
h1{font-size:1.6rem;margin-bottom:.5rem}
h1 span{color:var(--accent)}
.source{color:var(--muted);font-size:.75rem;margin-bottom:1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem}
.card{background:var(--card);border-radius:var(--radius);padding:1.5rem;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.card h2{font-size:.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.big{font-size:2.4rem;font-weight:700;line-height:1}
.sub{color:var(--muted);font-size:.85rem;margin-top:.25rem}
.node-list{margin-top:1rem}
.node-item{background:rgba(255,255,255,.03);border-radius:8px;padding:1rem;margin:.75rem 0;border-left:3px solid var(--green)}
.node-item.degraded{border-left-color:var(--yellow)}
.node-item.offline{border-left-color:var(--red);opacity:.7}
.node-name{font-weight:600;font-size:.95rem;margin-bottom:.25rem}
.node-ip{color:var(--muted);font-size:.75rem;font-family:monospace}
.node-meta{display:flex;gap:1rem;margin-top:.5rem;font-size:.8rem}
.status-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.7rem;font-weight:600}
.status-online{background:rgba(34,197,94,.2);color:var(--green)}
.status-degraded{background:rgba(250,204,21,.2);color:var(--yellow)}
.status-offline{background:rgba(239,68,68,.2);color:var(--red)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-top:1rem}
.stat-box{background:rgba(255,255,255,.03);padding:.75rem;border-radius:6px;text-align:center}
.stat-val{font-size:1.6rem;font-weight:700}
.stat-label{font-size:.75rem;color:var(--muted);margin-top:.25rem}
footer{margin-top:2rem;text-align:center;color:var(--muted);font-size:.75rem}
#error-banner{display:none;background:rgba(239,68,68,.15);border:1px solid var(--red);color:var(--red);padding:.75rem 1rem;border-radius:var(--radius);margin-bottom:1rem;font-size:.85rem}
</style>
</head>
<body>
<h1>🌐 <span>Remote Health</span></h1>
<div class="source" id="src">Source: panel_output/remote_health.json</div>
<div id="error-banner"></div>
<div id="content"></div>
<footer id="footer">Remote Health v0.6.0 · ASK-P6-002</footer>
<script>
const PATH='../panel_output/remote_health.json';
const REFRESH_MS=30000;

function fmtTime(iso){try{return new Date(iso).toLocaleString()}catch{return iso||'unknown'}}

async function load(){
  try{
    const r=await fetch(PATH,{cache:'no-store'});
    const j=await r.json();
    
    if(j.data.error){
      document.getElementById('error-banner').style.display='block';
      document.getElementById('error-banner').textContent='Error: '+j.data.error;
      return;
    }
    
    const nodes=j.data.nodes||[];
    const summary=j.data.summary||{total:0,online:0,degraded:0,offline:0};
    
    document.getElementById('src').textContent='Source: panel_output/remote_health.json · Updated: '+fmtTime(j.timestamp);
    
    const nodesHtml=nodes.map(n=>{
      const statusClass=n.status==='online'?'status-online':n.status==='degraded'?'status-degraded':'status-offline';
      const latency=n.latency_ms?n.latency_ms.toFixed(1)+'ms':'–';
      const ssh=n.ssh_available?'✓ SSH':'✗ SSH';
      
      return `
        <div class="node-item ${n.status}">
          <div class="node-name">${n.name}</div>
          <div class="node-ip">${n.ip} · ${n.description||''}</div>
          <div class="node-meta">
            <span class="status-badge ${statusClass}">${n.status.toUpperCase()}</span>
            <span>⏱ ${latency}</span>
            <span>${ssh}</span>
          </div>
        </div>
      `;
    }).join('');
    
    document.getElementById('content').innerHTML=`
      <div class="grid">
        <div class="card">
          <h2>Network Summary</h2>
          <div class="big" style="color:var(--green)">${summary.online}</div>
          <div class="sub">of ${summary.total} nodes online</div>
          <div class="stats-grid">
            <div class="stat-box">
              <div class="stat-val" style="color:var(--green)">${summary.online}</div>
              <div class="stat-label">Online</div>
            </div>
            <div class="stat-box">
              <div class="stat-val" style="color:var(--yellow)">${summary.degraded}</div>
              <div class="stat-label">Degraded</div>
            </div>
            <div class="stat-box">
              <div class="stat-val" style="color:var(--red)">${summary.offline}</div>
              <div class="stat-label">Offline</div>
            </div>
          </div>
        </div>
        
        <div class="card" style="grid-column:1/-1">
          <h2>Nodes (${nodes.length})</h2>
          <div class="node-list">${nodesHtml}</div>
        </div>
      </div>
    `;
    
    document.getElementById('footer').textContent='Remote Health v0.6.0 · ASK-P6-002 · Last refresh: '+new Date().toLocaleTimeString();
  }catch(e){
    document.getElementById('error-banner').style.display='block';
    document.getElementById('error-banner').textContent=e.message;
    document.getElementById('content').innerHTML='<div class="card"><h2>Waiting for data…</h2><p>Run <code>python scripts/remote_health_monitor.py</code></p></div>';
  }
}
load();
setInterval(load,REFRESH_MS);
</script>
</body>
</html>
