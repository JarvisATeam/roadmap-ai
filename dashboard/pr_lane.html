<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PR Lane — Dashboard</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--accent:#38bdf8;--green:#22c55e;--yellow:#facc15;--red:#ef4444;--text:#e2e8f0;--muted:#94a3b8;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem}
h1{font-size:1.6rem;margin-bottom:.5rem}
h1 span{color:var(--accent)}
.source{color:var(--muted);font-size:.75rem;margin-bottom:1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:1.5rem}
.card{background:var(--card);border-radius:var(--radius);padding:1.5rem;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.card h2{font-size:.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.big{font-size:2.4rem;font-weight:700;line-height:1}
.sub{color:var(--muted);font-size:.85rem;margin-top:.25rem}
.pr-list{margin-top:1rem}
.pr-item{background:rgba(255,255,255,.03);border-radius:8px;padding:1rem;margin:.75rem 0;border-left:3px solid var(--accent)}
.pr-item.draft{border-left-color:var(--yellow);opacity:.8}
.pr-title{font-weight:600;font-size:.9rem;margin-bottom:.25rem}
.pr-meta{color:var(--muted);font-size:.75rem;margin-top:.5rem}
.pr-labels{display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap}
.label{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.7rem;background:rgba(56,189,248,.2);color:var(--accent)}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted)}
.fallback{text-align:center;padding:3rem 1rem}
footer{margin-top:2rem;text-align:center;color:var(--muted);font-size:.75rem}
#error-banner{display:none;background:rgba(239,68,68,.15);border:1px solid var(--red);color:var(--red);padding:.75rem 1rem;border-radius:var(--radius);margin-bottom:1rem;font-size:.85rem}
</style>
</head>
<body>
<h1>🔀 <span>PR Lane</span></h1>
<div class="source" id="src">Source: panel_output/pr_lane.json</div>
<div id="error-banner"></div>
<div id="content"></div>
<footer id="footer">PR Lane v0.6.0 · ASK-P6-001</footer>
<script>
const PATH='../panel_output/pr_lane.json';
const REFRESH_MS=30000;

function fmtTime(iso){try{return new Date(iso).toLocaleString()}catch{return iso||'unknown'}}

async function load(){
  try{
    const r=await fetch(PATH,{cache:'no-store'});
    const j=await r.json();
    
    if(j.data.error){
      document.getElementById('error-banner').style.display='block';
      document.getElementById('error-banner').textContent='Error: '+j.data.error;
      document.getElementById('content').innerHTML='<div class="card fallback"><h2>GitHub API Error</h2><p>'+j.data.error+'</p></div>';
      return;
    }
    
    const prs=j.data.pull_requests||[];
    const repo=j.data.repository||'unknown';
    const openCount=j.data.open_prs||0;
    const rateLimit=j.metadata.rate_limit_remaining||'?';
    
    document.getElementById('src').textContent='Source: panel_output/pr_lane.json · Updated: '+fmtTime(j.timestamp);
    
    let prsHtml='';
    if(prs.length>0){
      prsHtml=prs.map(pr=>`
        <div class="pr-item ${pr.draft?'draft':''}">
          <div class="pr-title">#${pr.number} ${pr.title}</div>
          <div class="pr-meta">
            by ${pr.author} · ${fmtTime(pr.updated_at)}
            ${pr.draft?' · <strong>DRAFT</strong>':''}
          </div>
          ${pr.labels.length>0?`<div class="pr-labels">${pr.labels.map(l=>'<span class="label">'+l+'</span>').join('')}</div>`:''}
        </div>
      `).join('');
    }else{
      prsHtml='<div class="empty-state">No open pull requests</div>';
    }
    
    document.getElementById('content').innerHTML=`
      <div class="grid">
        <div class="card">
          <h2>Repository</h2>
          <div class="big" style="color:var(--accent)">${openCount}</div>
          <div class="sub">Open PRs</div>
          <div style="margin-top:1rem;font-size:.85rem">
            <div style="color:var(--muted)">Repository: ${repo}</div>
            <div style="color:var(--muted);margin-top:.5rem">Rate limit: ${rateLimit} remaining</div>
          </div>
        </div>
        <div class="card" style="grid-column:1/-1">
          <h2>Pull Requests</h2>
          <div class="pr-list">${prsHtml}</div>
        </div>
      </div>
    `;
    
    document.getElementById('footer').textContent='PR Lane v0.6.0 · ASK-P6-001 · Last refresh: '+new Date().toLocaleTimeString();
  }catch(e){
    document.getElementById('error-banner').style.display='block';
    document.getElementById('error-banner').textContent=e.message;
    document.getElementById('content').innerHTML='<div class="card fallback"><h2>Waiting for data…</h2><p>Run <code>python scripts/github_pr_sync.py</code></p></div>';
  }
}
load();
setInterval(load,REFRESH_MS);
</script>
</body>
</html>
